<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#g1)"/>
  <rect width="1600" height="900" fill="url(#g2)"/>
  <!-- Buildings -->
  <rect x="200" y="400" width="300" height="400" rx="5" fill="#ffffff" opacity="0.15"/>
  <rect x="550" y="300" width="400" height="500" rx="5" fill="#ffffff" opacity="0.12"/>
  <rect x="1000" y="350" width="350" height="450" rx="5" fill="#ffffff" opacity="0.15"/>
  <rect x="220" y="420" width="40" height="60" rx="3" fill="#ffd700" opacity="0.3"/>
  <rect x="280" y="420" width="40" height="60" rx="3" fill="#ffd700" opacity="0.3"/>
  <rect x="570" y="320" width="40" height="60" rx="3" fill="#ffd700" opacity="0.3"/>
  <rect x="630" y="320" width="40" height="60" rx="3" fill="#ffd700" opacity="0.3"/>
  <!-- Dome -->
  <ellipse cx="750" cy="300" rx="200" ry="80" fill="#ffffff" opacity="0.08"/>
  <rect x="700" y="280" width="100" height="20" rx="3" fill="#ffd700" opacity="0.4"/>
  <!-- Trees -->
  <circle cx="100" cy="650" r="40" fill="#2e7d32" opacity="0.3"/>
  <circle cx="150" cy="680" r="30" fill="#2e7d32" opacity="0.2"/>
  <circle cx="1450" cy="620" r="45" fill="#2e7d32" opacity="0.3"/>
  <circle cx="1520" cy="660" r="35" fill="#2e7d32" opacity="0.2"/>
  <!-- Path -->
  <path d="M0 850 Q400 800 800 850 Q1200 900 1600 850" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
  <text x="800" y="200" text-anchor="middle" fill="#ffffff" font-family="Arial" font-weight="bold" font-size="60" opacity="0.8">Campus View</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#g1)"/>
  <!-- Library building -->
  <rect x="300" y="250" width="500" height="550" rx="8" fill="#ffffff" opacity="0.1"/>
  <rect x="350" y="300" width="100" height="150" rx="4" fill="#ffd700" opacity="0.2"/>
  <rect x="500" y="300" width="100" height="150" rx="4" fill="#ffd700" opacity="0.2"/>
  <rect x="650" y="300" width="100" height="150" rx="4" fill="#ffd700" opacity="0.2"/>
  <rect x="350" y="500" width="400" height="8" fill="#ffd700" opacity="0.3"/>
  <rect x="350" y="550" width="400" height="8" fill="#ffd700" opacity="0.3"/>
  <!-- Clock tower -->
  <rect x="520" y="150" width="60" height="100" rx="5" fill="#ffffff" opacity="0.15"/>
  <rect x="530" y="160" width="40" height="40" rx="20" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.5"/>
  <!-- Right building -->
  <rect x="1000" y="350" width="400" height="450" rx="8" fill="#ffffff" opacity="0.08"/>
  <rect x="1050" y="400" width="80" height="120" rx="4" fill="#ffd700" opacity="0.15"/>
  <rect x="1170" y="400" width="80" height="120" rx="4" fill="#ffd700" opacity="0.15"/>
  <rect x="1290" y="400" width="80" height="120" rx="4" fill="#ffd700" opacity="0.15"/>
  <!-- Students silhouette -->
  <circle cx="850" cy="780" r="10" fill="#ffffff" opacity="0.2"/>
  <circle cx="880" cy="780" r="10" fill="#ffffff" opacity="0.2"/>
  <circle cx="910" cy="780" r="10" fill="#ffffff" opacity="0.2"/>
  <text x="800" y="120" text-anchor="middle" fill="#ffffff" font-family="Arial" font-weight="bold" font-size="50" opacity="0.8">Library & Campus</text>
</svg>
